repos:
-   repo: local
    hooks:
    -   id: mypy
        name: Run mypy
        entry: uv run mypy
        language: system
        files: ^src/
        types: [python]

-   repo: local
    hooks:
    -   id: black
        name: Run black
        entry: uv run black
        args: ["--config", "pyproject.toml"]
        language: system
        types: [python]

-   repo: local
    hooks:
    -   id: isort
        name: Run isort
        entry: uv run isort
        args: ["--profile", "black", "--filter-files", "src", "tests"]
        language: system
        types: [python]
