library:
  id: simple_models
  description: Simple model library 


  port-types:
    - id: flow
      description: A port which transfers power flow
      fields:
        - id: flow
    - id: emission
      description: A port which accounts for CO2 emissions
      fields:
        - id: emission

  models:
    - id: bus

      parameters:
        - id: v_nom
          time-dependent: false
          scenario-dependent: false
        - id: x
          time-dependent: false
          scenario-dependent: false
        - id: y
          time-dependent: false
          scenario-dependent: false
        - id: v_mag_pu_set
          time-dependent: true
          scenario-dependent: false
        - id: v_mag_pu_min
          time-dependent: false
          scenario-dependent: false
        - id: v_mag_pu_max
          time-dependent: false
          scenario-dependent: false
      ports:
        - id: p_balance_port
          type: flow
        - id: q_balance_port
          type: flow
      binding-constraints:
        - id: p_balance
          expression: sum_connections(p_balance_port.flow) = 0
        - id: q_balance
          expression: sum_connections(q_balance_port.flow) = 0
    
    - id: load

      parameters:
        - id: p_set
          time-dependent: true
          scenario-dependent: true
        - id: q_set
          time-dependent: true
          scenario-dependent: true
        - id: sign 
          time-dependent: false
          scenario-dependent: false
      ports:
        - id: p_balance_port
          type: flow
        - id: q_balance_port
          type: flow
      port-field-definitions:
        - port: p_balance_port
          field: flow
          definition: sign * p_set
        - port: q_balance_port
          field: flow
          definition: sign * q_set

    - id: generator
      parameters:
        - id: p_nom_min
          time-dependent: false
          scenario-dependent: false 
        - id: p_nom_max
          time-dependent: false
          scenario-dependent: false
        - id: p_min_pu
          time-dependent: true
          scenario-dependent: true
        - id: p_max_pu
          time-dependent: true
          scenario-dependent: true
        - id: e_sum_min
          time-dependent: false
          scenario-dependent: true
        - id: e_sum_max
          time-dependent: false
          scenario-dependent: true
        - id: sign #default value = 1
          time-dependent: false
          scenario-dependent: false
        #- id: carrier # This parameter is not used in the Gems model
        - id: marginal_cost
          time-dependent: true
          scenario-dependent: true
        - id: capital_cost
          time-dependent: false
          scenario-dependent: false
        - id: efficiency
          time-dependent: true
          scenario-dependent: true
        - id: emission_factor
          time-dependent: false
          scenario-dependent: false
        
      variables:
        - id: p_nom
          lower-bound: p_nom_min
          upper-bound: p_nom_max
          time-dependent: false
          scenario-dependent: false
        - id: p
        #- id: q
      ports:
        - id: p_balance_port
          type: flow
        - id: emission_port
          type: emission
      port-field-definitions:
        - port: p_balance_port
          field: flow
          definition: p*sign
        - port: emission_port
          field: emission
          definition: p*emission_factor/efficiency
      constraints:
      - id: min_dispatch
        expression: p >=p_nom * p_min_pu
      - id: max_dispatch
        expression: p <=p_nom * p_max_pu
      - id: min_production
        expression: sum(p) >= e_sum_min
      - id: max_production
        expression: sum(p) <= e_sum_max
      objective-contributions:
        - id: capital_objective
          expression: p_nom * capital_cost
        - id: operational_objective
          expression: expec(sum(marginal_cost * p))



    - id: storage_unit
      parameters:
        - id: p_nom_min
          time-dependent: false
          scenario-dependent: false
        - id: p_nom_max
          time-dependent: false
          scenario-dependent: false
        - id: p_min_pu
          time-dependent: true
          scenario-dependent: true
        - id: p_max_pu
          time-dependent: true
          scenario-dependent: true
        - id: sign #default value = 1
          time-dependent: false
          scenario-dependent: false
        #- id: carrier # This parameter is not used in the Gems model
        - id: spill_cost #Parameter not instantiated for now
          time-dependent: true
          scenario-dependent: true
        - id: marginal_cost
          time-dependent: true
          scenario-dependent: true
        - id: marginal_cost_storage 
          time-dependent: true
          scenario-dependent: true
        - id: capital_cost
          time-dependent: false
          scenario-dependent: false
        - id: max_hours
          time-dependent: false
          scenario-dependent: false
        - id: efficiency_store
          time-dependent: true
          scenario-dependent: true
        - id: efficiency_dispatch
          time-dependent: true
          scenario-dependent: true
        - id: standing_loss
          time-dependent: true
          scenario-dependent: true
        - id: inflow
          time-dependent: true
          scenario-dependent: true
        - id: emission_factor
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: p_nom
          time-dependent: false
          scenario-dependent: false
          lower-bound: p_nom_min
          upper-bound: p_nom_max
        - id: p_store
          lower-bound: 0
          upper-bound: p_max_pu * p_nom_max
        - id: p_dispatch
          lower-bound: 0
          upper-bound: p_max_pu * p_nom_max
        - id: state_of_charge
          lower-bound: 0
          upper-bound: max_hours * p_nom_max
        - id: spill
          lower-bound: 0
      ports:
        - id: p_balance_port
          type: flow
        - id: emission_port
          type: emission
      port-field-definitions:
        - port: p_balance_port
          field: flow
          definition: p_dispatch - p_store
        - port: emission_port
          field: emission
          definition: emission_factor * 0 #Since we assume here cyclity of StorageUnits. In the future, for non-cyclic Store: (e[-1] - e[T-1])*emission_factor
      constraints:
        - id: p_store_upper
          expression: p_store <= p_max_pu * p_nom
        - id: p_dispatch_upper
          expression: p_dispatch <= p_max_pu * p_nom
        - id: state_of_charge_upper
          expression: state_of_charge <= max_hours * p_nom
        - id: state_of_charge_balance
          expression: state_of_charge = (1- standing_loss) * state_of_charge[t-1] + efficiency_store * p_store - p_dispatch / efficiency_dispatch  + inflow - spill
      objective-contributions:
        - id: capital_objective
          expression: capital_cost * p_nom
        - id: operational_objective
          expression: expec(sum(marginal_cost * p_dispatch + spill_cost*spill + marginal_cost_storage * state_of_charge))

  