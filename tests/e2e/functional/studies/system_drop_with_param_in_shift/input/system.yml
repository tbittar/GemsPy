# Study: system_drop_with_param_in_shift
#
# 3 time steps, 1 bus, 1 load [10, 10, 100], 2 generators:
#   - gen_1: expensive (marginal_cost=100, startup_cost=500), p_min=10, p_max=90,
#            d_min_up=2, d_min_down=1
#   - gen_2: cheap (marginal_cost=10, no startup cost), p_min=0, p_max=10,
#            d_min_up=1, d_min_down=1
#
# The optim-config enables "drop" out-of-bounds processing for
# is_on_dynamics, min_up_duration, and min_down_duration on the generator
# model. Out-of-bounds references are dropped (constraint not instantiated)
# instead of wrapping around:
#   - is_on_dynamics (shift -1): dropped at t=0 for both gen_1 and gen_2 → 4 instances
#   - min_up_duration (d_min_up=2): sum range [-1,0] → dropped at t=0 for gen_1;
#     gen_2 (d_min_up=1, range [0,0]) is always in-bounds → 5 instances total
#   - min_down_duration (d_min_down=1): range [0,0] → never dropped → 6 instances
#
# Optimal solution:
#   gen_1 starts at t=2 only; gen_2 covers t=0 and t=1.
#   With is_on_dynamics dropped at t=0, gen_1's initial state is unconstrained.
#   With min_up_duration dropped at t=0 for gen_1, the start at t=2 does not
#   force gen_1 on at t=0. gen_1 produces its maximum (90) at t=2; gen_2
#   covers the remaining 10.
#
#   gen_2 at t=0: marginal_cost * p = 10*10  =   100
#   gen_2 at t=1: marginal_cost * p = 10*10  =   100
#   gen_1 at t=2: marginal_cost * p = 100*90 =  9000
#   gen_2 at t=2: marginal_cost * p = 10*10  =   100
#   gen_1 startup                             =   500
#   Total optimal cost = 9800

system:
  id: system_drop_with_param_in_shift
  model_libraries: simple_models
  components:
    - id: bus
      model: simple_models.bus
      parameters:
        - id: v_nom
          time-dependent: false
          scenario-dependent: false
          value: 1.0
        - id: x
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: y
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: v_mag_pu_set
          time-dependent: false
          scenario-dependent: false
          value: 1.0
        - id: v_mag_pu_min
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: v_mag_pu_max
          time-dependent: false
          scenario-dependent: false
          value: 1.0e+20

    - id: load
      model: simple_models.load
      parameters:
        - id: p_set
          time-dependent: true
          scenario-dependent: true
          value: load
        - id: q_set
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: sign
          time-dependent: false
          scenario-dependent: false
          value: -1.0

    - id: gen_1
      model: simple_models.generator
      parameters:
        - id: p_min
          time-dependent: false
          scenario-dependent: false
          value: 10.0
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 90.0
        - id: marginal_cost
          time-dependent: false
          scenario-dependent: false
          value: 100.0
        - id: startup_cost
          time-dependent: false
          scenario-dependent: false
          value: 500.0
        - id: d_min_up
          time-dependent: false
          scenario-dependent: false
          value: 2
        - id: d_min_down
          time-dependent: false
          scenario-dependent: false
          value: 1

    - id: gen_2
      model: simple_models.generator
      parameters:
        - id: p_min
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 10.0
        - id: marginal_cost
          time-dependent: false
          scenario-dependent: false
          value: 10.0
        - id: startup_cost
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: d_min_up
          time-dependent: false
          scenario-dependent: false
          value: 1
        - id: d_min_down
          time-dependent: false
          scenario-dependent: false
          value: 1

  connections:
    - component1: bus
      port1: p_balance_port
      component2: load
      port2: p_balance_port
    - component1: bus
      port1: p_balance_port
      component2: gen_1
      port2: p_balance_port
    - component1: bus
      port1: p_balance_port
      component2: gen_2
      port2: p_balance_port
