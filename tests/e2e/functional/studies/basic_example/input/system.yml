system:
  id: basic_example

  components:
    - id: area
      model: basic_lib.area
      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000

    - id: nuclear_1
      model: basic_lib.generator_basic
      parameters:
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 250
        - id: cost
          time-dependent: false
          scenario-dependent: false
          value: 10
      properties:
        - key: technology
          value: nuclear

    - id: nuclear_2
      model: basic_lib.generator_basic
      parameters:
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 250
        - id: cost
          time-dependent: false
          scenario-dependent: false
          value: 10
      properties:
        - key: technology
          value: nuclear

    - id: gas_1
      model: basic_lib.generator_basic
      parameters:
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 250
        - id: cost
          time-dependent: false
          scenario-dependent: false
          value: 50
      properties:
        - key: technology
          value: gas

    - id: gas_2
      model: basic_lib.generator_basic
      parameters:
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 250
        - id: cost
          time-dependent: false
          scenario-dependent: false
          value: 50
      properties:
        - key: technology
          value: gas

    - id: load
      model: basic_lib.load
      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
          value: load_data

  connections:
    - component1: area
      port1: balance_port
      component2: nuclear_1
      port2: balance_port

    - component1: area
      port1: balance_port
      component2: nuclear_2
      port2: balance_port

    - component1: area
      port1: balance_port
      component2: gas_1
      port2: balance_port

    - component1: area
      port1: balance_port
      component2: gas_2
      port2: balance_port

    - component1: area
      port1: balance_port
      component2: load
      port2: balance_port
