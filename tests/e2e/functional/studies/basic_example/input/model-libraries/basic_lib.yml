library:
  id: basic_lib
  description: Basic library with area, generator, and load models

  port-types:
    - id: flow
      description: A port which transfers power flow
      fields:
        - id: flow

  models:
    - id: area
      taxonomy-category: balance
      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: spillage
          lower-bound: 0
          upper-bound: 1000000
          variable-type: continuous
        - id: unsupplied_energy
          lower-bound: 0
          upper-bound: 1000000
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      binding-constraints:
        - id: balance
          expression: sum_connections(balance_port.flow) = spillage - unsupplied_energy
      objective-contributions:
        - id: operational_objective
          expression: expec(sum(spillage_cost * spillage + unsupplied_energy_cost * unsupplied_energy))

    - id: generator_basic
      taxonomy-category: production
      parameters:
        - id: p_max
          time-dependent: false
          scenario-dependent: false
        - id: cost
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: generation
          lower-bound: 0
          upper-bound: p_max
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: generation
      objective-contributions:
        - id: operational_objective
          expression: expec(sum(cost * generation))

    - id: load
      taxonomy-category: consumption
      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -load
