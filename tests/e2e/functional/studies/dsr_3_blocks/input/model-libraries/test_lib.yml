library:
  id: test-lib
  description: Minimal model library for the dsr_3_blocks e2e test

  port-types:
    - id: flow
      description: A port which transfers power flow
      fields:
        - id: flow

  models:
    - id: area
      parameters:
        - id: spillage_cost
        - id: ens_cost
      variables:
        - id: spillage
          lower-bound: 0
        - id: unsupplied_energy
          lower-bound: 0
      ports:
        - id: balance_port
          type: flow
      binding-constraints:
        - id: balance
          expression: sum_connections(balance_port.flow) = spillage - unsupplied_energy
      objective-contributions:
        - id: obj
          expression: expec(sum(spillage_cost * spillage + ens_cost * unsupplied_energy))

    - id: load
      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -load

    - id: renewable
      parameters:
        - id: nominal_capacity
        - id: unit_count
        - id: generation
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: generation

    - id: dsr
      parameters:
        - id: max_load
          time-dependent: true
          scenario-dependent: true
        - id: curtailment_price
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: curtailment
          lower-bound: 0
          upper-bound: max_load
      objective-contributions:
        - id: obj
          expression: expec(sum(curtailment * curtailment_price))
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -max_load + curtailment

    - id: simple_generator
      parameters:
        - id: p_min
          scenario-dependent: true
          time-dependent: true
        - id: p_max
          scenario-dependent: true
          time-dependent: true
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
        - id: co2_emission_factor
          scenario-dependent: false
          time-dependent: false
      variables:
        - id: generation
          lower-bound: p_min
          upper-bound: p_max
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: generation
      objective-contributions:
        - id: objective
          expression: expec(sum(generation_cost * generation))
