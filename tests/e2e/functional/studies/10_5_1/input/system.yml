   # Study case 10_5 : to test extra-output features
   # Small test case with one node (1 thermal cluster, 1 one load)

system:

  id: case_10_5
  description: One timestep problem
  components:
    - id: base_zone
      model: library-eo.area
      parameters:
      - id: spillage_cost
        time-dependent: false
        scenario-dependent: false
        value: 10000
      - id: ens_cost
        time-dependent: false
        scenario-dependent: false
        value: 20000

    
    - id: load_base_zone
      model: library-eo.load
      parameters:
        - id: load_value
          time-dependent: false
          scenario-dependent: false
          value : 110

    
    - id: gas_base_zone
      model: library-eo.simple_gen
      parameters:
        - id: p_max_cluster # timeseries that takes outages into account
          scenario-dependent: false 
          time-dependent: false
          value: 100
        - id: marginal_generation_cost
          scenario-dependent: false 
          time-dependent: false
          value: 10

    - id: oil_base_zone
      model: library-eo.simple_gen
      parameters:
        - id: p_max_cluster # timeseries that takes outages into account
          scenario-dependent: false 
          time-dependent: false
          value: 100
        - id: marginal_generation_cost
          scenario-dependent: false 
          time-dependent: false
          value: 50


  connections:
    - component1: base_zone
      port1: balance_port
      component2: load_base_zone
      port2: balance_port

    - component1: base_zone
      port1: balance_port
      component2: gas_base_zone
      port2: balance_port
    
    - component1: base_zone
      port1: balance_port
      component2: oil_base_zone
      port2: balance_port

