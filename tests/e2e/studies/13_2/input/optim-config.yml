time-scope:
  first-time-step: 0
  last-time-step: 0

solver-options:
  solver: highs
  solver-logs: true
  solver-parameters: "THREADS 1"

scenario-scope:
  nb-scenarios: 1

models:
  - id: lib_example_13_2.generator_with_discrete_invest
    model-decomposition:
      variables:
        - id: nb_units
          location: master
        - id: p_max
          location: master-and-subproblems
        # Variable generation has default settings, no need to make it appear here
      constraints:
        - id: p_max_nb_units_relation
          location: master
        # Constraint max_generation has default settings, no need to make it appear here
      objective-contributions:
        - id: invest_objective
          location: master
        - id: operational_objective
          location: subproblems
  
  - id: lib_example_13_2.generator_with_continuous_invest
    model-decomposition:
      variables:
        - id: p_max
          location: master-and-subproblems
        # Variable generation has default settings, no need to make it appear here
      objective-contributions:
        - id: invest_objective
          location: master
        - id: operational_objective
          location: subproblems